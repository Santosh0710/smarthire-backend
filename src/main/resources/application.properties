# ================================
# APPLICATION INFO
# ================================
spring.application.name=smarthire-backend
server.port=8080

# ================================
# DATABASE CONNECTION
# ================================
# Where is our database running?
spring.datasource.url=jdbc:mysql://localhost:3306/smarthire_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

# Which user should connect?
spring.datasource.username=smarthire_user

# What is the password?
spring.datasource.password=SmartHire@2026

# Which JDBC driver to use?
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ================================
# JPA / HIBERNATE
# ================================
# Automatically create/update tables based on our Java entities
spring.jpa.hibernate.ddl-auto=update


# Show SQL queries in console (helpful during development)
spring.jpa.show-sql=true

# Format the SQL nicely in console
spring.jpa.properties.hibernate.format_sql=true

# ================================
# LOGGING
# ================================
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.smarthire=INFO

# Disable open-in-view to prevent lazy loading issues
spring.jpa.open-in-view=false